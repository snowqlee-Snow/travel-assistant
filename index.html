    document.querySelectorAll(`[data-id="${r.id}"][data-comment-user]`).forEach((el) => el.addEventListener("blur", () => { updateState(r.id, { [`${el.dataset.commentUser}Comment`]: el.value.trim() }); showToast("评价已保存"); }));
    document.querySelectorAll(`[data-id="${r.id}"][data-star][data-rating-user]`).forEach((el) => el.addEventListener("click", () => { const user = el.dataset.ratingUser; const star = Number(el.dataset.star || 0); const st = getState(r.id); const prev = Number(st[`${user}Rating`] || 0); const next = prev === star ? 0 : star; updateState(r.id, { [`${user}Rating`]: next }); renderFoodList(); showToast("星级已保存"); }));
  });
}
function initMap() { map = L.map("map", { zoomControl: true }).setView([35.35, 139.4], 9); L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { attribution: "&copy; OpenStreetMap contributors" }).addTo(map); markerLayer = L.layerGroup().addTo(map); renderMapToolbar(); renderMarkers(); }
function renderMapToolbar() {
  const wrap = document.getElementById("map-toolbar"); if (!wrap) return;
  wrap.innerHTML = `<button class="secondary" id="btn-map-all">显示全部地点</button><button class="secondary" id="btn-map-area" ${currentArea ? "" : "disabled"}>缩放到当前区域</button>`;
  document.getElementById("btn-map-all").addEventListener("click", () => { currentArea = ""; renderMarkers(); fitToMarkers(); });
  document.getElementById("btn-map-area").addEventListener("click", () => { if (!currentArea) return; fitToMarkers(true); });
}
function renderMarkers() {
  if (!markerLayer) return; markerLayer.clearLayers();
  const pool = places.filter((p) => Number.isFinite(p.lat) && Number.isFinite(p.lng)); const data = currentArea ? pool.filter((p) => p.area === currentArea) : pool;
  data.forEach((p) => { const marker = L.circleMarker([p.lat, p.lng], { radius: focusPlaceId === p.id ? 10 : 7, color: STATUS_COLORS[p.type] || "blue", fillOpacity: 0.8 }).addTo(markerLayer); marker.bindPopup(placePopupHtml(p)); marker.on("popupopen", () => bindPopupEvents(p)); });
  if (focusPlaceId && data.some((p) => p.id === focusPlaceId)) { const target = data.find((p) => p.id === focusPlaceId); map.setView([target.lat, target.lng], 14); }
}
function placePopupHtml(p) {
  const relatedTrips = trips.filter((t) => (p.tripItemIds || []).includes(t.id));
  const relatedFood = restaurants.filter((r) => (p.restaurantIds || []).includes(r.id));
  const links = unique(relatedTrips.flatMap((t) => t.links || []).map((l) => JSON.stringify(l))).map((s) => JSON.parse(s));
  const st = getState(p.id);
  const foodItems = relatedFood
    .map((r) => `<button type="button" class="popup-chip" data-popup-food="${r.id}">${escapeHtml(r.name)}</button>`)
    .join("");
  const tripItems = relatedTrips
    .map((t) => `<button type="button" class="popup-chip" data-popup-trip="${t.id}">${escapeHtml(t.date)} ${escapeHtml(t.title)}</button>`)
    .join("");
  return `
    <div class="map-popup">
      <div class="map-popup__title">${escapeHtml(p.name)}</div>
      <div class="map-popup__meta">${escapeHtml(p.type || "-")} · ${escapeHtml(p.area || "-")}</div>
      <div class="map-popup__section">
        <div class="map-popup__section-title">关联行程</div>
        <div class="popup-chip-list">${tripItems || "<span class='map-popup__empty'>暂无</span>"}</div>
      </div>
      <div class="map-popup__section">
        <div class="map-popup__section-title">关联餐厅</div>
        <div class="popup-chip-list">${foodItems || "<span class='map-popup__empty'>暂无</span>"}</div>
      </div>
      <div class="map-popup__section">
        <div class="map-popup__section-title">参考链接</div>
        <div class="map-popup__links">${renderLinks(links)}</div>
      </div>
      <div class="map-popup__section map-popup__state">Snow：${escapeHtml(st.snowStatus)} ｜ Paige：${escapeHtml(st.paigeStatus)}</div>
      <textarea rows="2" data-popup-comment="snow" data-id="${p.id}" placeholder="Snow 地点备注">${escapeHtml(st.snowComment)}</textarea>
      <textarea rows="2" data-popup-comment="paige" data-id="${p.id}" placeholder="Paige 地点备注">${escapeHtml(st.paigeComment)}</textarea>
    </div>`;
}
function bindPopupEvents(p) {
  document.querySelectorAll("[data-popup-trip]").forEach((el) => el.addEventListener("click", (e) => { e.preventDefault(); switchTab("trip"); const target = document.getElementById(`trip-${el.dataset.popupTrip}`); if (target) target.scrollIntoView({ behavior: "smooth", block: "center" }); }));
  document.querySelectorAll("[data-popup-food]").forEach((el) => el.addEventListener("click", (e) => { e.preventDefault(); switchTab("food"); const target = document.getElementById(`food-${el.dataset.popupFood}`); if (target) target.scrollIntoView({ behavior: "smooth", block: "center" }); }));
  document.querySelectorAll(`[data-id="${p.id}"][data-popup-comment]`).forEach((el) => el.addEventListener("blur", () => { updateState(p.id, { [`${el.dataset.popupComment}Comment`]: el.value.trim() }); showToast("地点备注已保存"); }));
}
function openFoodCardFromPopup(restId) { switchTab("food"); setTimeout(() => { const target = document.getElementById(`food-${restId}`); if (target) target.scrollIntoView({ behavior: "smooth", block: "center" }); }, 60); }
function focusPlaceByTrip(tripId) { const place = places.find((p) => (p.tripItemIds || []).includes(tripId)); if (!place) { showToast("未找到对应地点坐标"); return; } focusPlaceId = place.id; switchTab("map"); renderMarkers(); const marker = markerLayer?._layers && Object.values(markerLayer._layers).find((m) => m?._latlng?.lat === place.lat && m?._latlng?.lng === place.lng); if (marker?.openPopup) marker.openPopup(); }
function focusRestaurant(restId) { const r = restaurants.find((x) => x.id === restId); if (!r || !Number.isFinite(r.lat) || !Number.isFinite(r.lng)) { showToast("该餐厅暂无坐标"); return; } switchTab("map"); focusPlaceId = places.find((p) => (p.restaurantIds || []).includes(restId))?.id || focusPlaceId; map.setView([r.lat, r.lng], 14); const html = `<div class="map-popup"><div class="map-popup__title">${escapeHtml(r.name)}</div><div class="map-popup__meta">${escapeHtml(r.area || "-")} · ${escapeHtml(r.category || "-")}</div><div class="map-popup__section"><div class="map-popup__section-title">跳转</div><button type="button" class="popup-chip" data-popup-food="${r.id}">打开餐厅卡片</button></div></div>`; L.popup({ closeButton: true, autoPan: true, maxWidth: 340 }).setLatLng([r.lat, r.lng]).setContent(html).openOn(map); setTimeout(() => { document.querySelectorAll(`[data-popup-food="${r.id}"]`).forEach((el) => el.addEventListener("click", (e) => { e.preventDefault(); openFoodCardFromPopup(r.id); })); }, 0); }
function fitToMarkers(limitArea = false) { const data = (limitArea && currentArea ? places.filter((p) => p.area === currentArea) : places).filter((p) => Number.isFinite(p.lat) && Number.isFinite(p.lng)); if (!data.length) return; const bounds = L.latLngBounds(data.map((p) => [p.lat, p.lng])); map.fitBounds(bounds, { padding: [20, 20] }); }
function getState(targetId) { const isFood = String(targetId).startsWith("rest-"); const defaultStatus = isFood ? "未打卡" : "未完成"; return userState[targetId] || { targetId, snowStatus: defaultStatus, paigeStatus: defaultStatus, snowComment: "", paigeComment: "", snowRating: 0, paigeRating: 0, lastModified: Date.now() }; }
function updateState(targetId, patch) { const old = getState(targetId); userState[targetId] = { ...old, ...patch, lastModified: Date.now() }; saveUserState(); }
function updateProgress() { const total = trips.length; const doneSnow = trips.filter((t) => getState(t.id).snowStatus === "已完成").length; const donePaige = trips.filter((t) => getState(t.id).paigeStatus === "已完成").length; document.getElementById("progress-snow").textContent = `Snow: ${doneSnow}/${total}`; document.getElementById("progress-paige").textContent = `Paige: ${donePaige}/${total}`; }
function resetAllData() { const ok = window.confirm("确认重置所有状态和备注？此操作不可撤销。"); if (!ok) return; localStorage.removeItem(STORAGE_KEY); userState = {}; renderTripList(); updateProgress(); showToast("已恢复初始状态"); }
function loadUserState() { try { const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : {}; } catch (_err) { return {}; } }
function saveUserState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(userState)); }
function renderLinks(links = []) { if (!Array.isArray(links) || !links.length) return ""; return links.filter((l) => l?.url).map((l, i) => `<a href="${l.url}" target="_blank" rel="noopener noreferrer">🔗 ${escapeHtml(l.title || `参考攻略-${i + 1}`)}</a>`).join(""); }
function renderNotes(notes = []) { const list = (notes || []).filter(Boolean); if (!list.length) return `<div class="meta">-</div>`; return `<ul class="note-list">${list.map((n) => `<li>${escapeHtml(n)}</li>`).join("")}</ul>`; }
function unique(arr) { return [...new Set(arr)]; }
function num(v) { return Number(v || 0).toFixed(2); }
function escapeHtml(str = "") { return String(str).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;"); }
let toastTimer; function showToast(text) { const el = document.getElementById("toast"); el.textContent = text; el.classList.add("show"); clearTimeout(toastTimer); toastTimer = setTimeout(() => el.classList.remove("show"), 1300); }
function statusClass(status) { return String(status || "").replace(/\s+/g, ""); }
function stateCardClass(snowStatus, paigeStatus, target) { const values = [snowStatus, paigeStatus]; if (target === "food") { if (values.includes("已打卡")) return "card-state-food-done"; if (values.includes("打算去")) return "card-state-food-plan"; return "card-state-food-todo"; } if (values.includes("放弃")) return "card-state-trip-drop"; if (values.includes("进行中")) return "card-state-trip-doing"; if (values.includes("已完成")) return "card-state-trip-done"; return "card-state-trip-todo"; }
function statusBarColor(status, target) { if (target === "food") { if (status === "已打卡") return "#16a34a"; if (status === "打算去") return "#2563eb"; return "#6b7280"; } if (status === "已完成") return "#16a34a"; if (status === "进行中") return "#2563eb"; if (status === "放弃") return "#dc2626"; return "#9ca3af"; }
function tripTypeClass(type) { const t = String(type || "").replace(/\s+/g, ""); if (t.includes("交通")) return "card-type-交通"; if (t.includes("住宿")) return "card-type-住宿"; if (t.includes("旅游")) return "card-type-旅游"; if (t.includes("饮食")) return "card-type-饮食"; if (t.includes("准备")) return "card-type-准备"; return ""; }
function getStartMinutes(timeRange = "") { const m = String(timeRange).match(/(\d{1,2}):(\d{1,2})/); if (!m) return 24 * 60; return Number(m[1]) * 60 + Number(m[2]); }
function compareTripByDateTime(a, b) { const d = String(a.date || "").localeCompare(String(b.date || "")); if (d !== 0) return d; return getStartMinutes(a.timeRange) - getStartMinutes(b.timeRange); }
init();
